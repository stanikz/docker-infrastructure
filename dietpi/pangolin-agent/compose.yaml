services:
  newt:
    image: fosrl/newt:1.9.0
    container_name: newt
    hostname: pangolin-agent
    restart: unless-stopped
    networks:
      - proxy-network
    env_file: .env
    environment:
      PANGOLIN_ENDPOINT: ${PANGOLIN_ENDPOINT}
      NEWT_ID: ${NEWT_ID}
      NEWT_SECRET: ${NEWT_SECRET}

networks:
  proxy-network:
    name: ${EXTERNAL_NETWORK_NAME:-proxy-network}
    external: true

