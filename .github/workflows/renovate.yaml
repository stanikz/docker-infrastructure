name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"  # Daily at noon UTC
  push:
    branches:
      - main

jobs:
  renovate:
    runs-on: ubuntu-latest
    container: ghcr.io/renovatebot/renovate:43.76.4
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Renovate
        run: renovate
        env:
          RENOVATE_CONFIG_FILE: renovate.json
          LOG_LEVEL: "debug"
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
