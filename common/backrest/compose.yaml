services:
  backrest:
    image: garethgeorge/backrest:v1.12.1
    container_name: backrest
    hostname: backrest
    restart: unless-stopped
    ports:
      - 9898:9898
    networks:
      - proxy-network
    environment:
      BACKREST_DATA: /data # path for backrest data. restic binary and the database are placed here.
      BACKREST_CONFIG: /config/config.json # path for the backrest config file.
      XDG_CACHE_HOME: /cache # path for the restic cache which greatly improves performance.
      TZ: ${TZ} # set the timezone for the container, used as the timezone for cron jobs.
    volumes:
      - ${DOCKER_DATA}/backrest/data:/data
      - ${DOCKER_DATA}/backrest/config:/config
      - ${DOCKER_DATA}/backrest/cache:/cache
      - ${DOCKER_DATA}/backrest/tmp:/tmp
      #- ${DOCKER_DATA}/backrest/rclone:/root/.config/rclone # Mount for rclone config (needed when using rclone remotes)
      #- /MY-BACKUP-DATA:/userdata # [optional] mount local paths to backup here.
      #- /MY-REPOS:/repos # [optional] mount repos if using local storage, not necessary for remotes e.g. B2, S3, etc.
    
networks:
  proxy-network:
    name: ${EXTERNAL_NETWORK_NAME:-proxy-network}
    external: true
