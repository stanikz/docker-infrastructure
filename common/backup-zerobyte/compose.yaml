services:
  # 1. Standard deployment (Base configuration)
  zerobyte:
    image: ghcr.io/nicotsx/zerobyte:v0.33.1
    container_name: zerobyte
    restart: unless-stopped
    profiles:
      - standard
    cap_add:
      - SYS_ADMIN
    ports:
      - 4096:4096
    networks:
      - proxy-network
    devices:
      - /dev/fuse:/dev/fuse
    environment:
      TZ: ${TZ}
      BASE_URL: ${BASE_URL:-http://localhost:4096}
      APP_SECRET: ${APP_SECRET}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS}
      TRUST_PROXY: ${TRUST_PROXY}
      RESTIC_HOSTNAME: ${RESTIC_HOSTNAME}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${DOCKER_PATH}/zerobyte:/var/lib/zerobyte
      - ${DOCKER_DATA}:/data

  # 2. Private deployment (Extends standard and appends the volume)
  zerobyte-private:
    extends:
      service: zerobyte
    container_name: zerobyte-private
    profiles:
      - private
    volumes:
      - ${PRIVATE_DATA:-/tmp}:${PRIVATE_DATA:-/tmp}:ro

networks:
  proxy-network:
    name: ${EXTERNAL_NETWORK_NAME:-proxy-network}
    external: true