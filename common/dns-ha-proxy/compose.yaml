#----------------------------------------------------------------------------------
# The profile "ha" is both used for both piholes and one of the two netbird clients 
#----------------------------------------------------------------------------------
# --------------------------------------------------------------------------------
# GLOBAL REUSABLE BLOCKS
# --------------------------------------------------------------------------------
x-common-env: &common-env
  TZ: ${TZ:-Europe/Stockholm}

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: "json-file"
    options:
      max-size: "100m"
      max-file: "3"

x-backrest-labels: &backrest-labels
    backrest.backup: "true"
    backrest.priority: "high"
    backrest.action: "stop"
    backrest.wait-time: "30"

# --------------------------------------------------------------------------------
# SERVICE TEMPLATES
# --------------------------------------------------------------------------------
x-npm-base: &npm-base
  image: jlesage/nginx-proxy-manager:v26.03.2
  <<: *restart
  environment:
    <<: *common-env
  ports:
    - "81:8181"
    - "80:8080"
    - "443:4443"
  labels:
    <<: *backrest-labels

# --------------------------------------------------------------------------------
# SERVICES
# --------------------------------------------------------------------------------
services:

  # ---------------- DNS STACK ----------------
  pihole:
    image: pihole/pihole:2026.04.1
    container_name: pihole
    hostname: pihole-${INSTANCE_ID:-primary}.local
    <<: *restart
    shm_size: 128m
    networks:
      dns-internal-net:
        ipv4_address: ${PIHOLE_IP:-172.22.0.6}
      proxy-network:
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "82:80/tcp"
    env_file:
      - "${DOCKER_DATA}/dns-ha-proxy/.env"
    environment:
      <<: *common-env
      WEBPASSWORD: ${PIHOLE_CREDENTIALS}
      DNS1: "${UNBOUND_IP:-172.22.0.7}#5335"
      DNSMASQ_LISTENING: all
    cap_add:
      - NET_ADMIN
    volumes:
      - "${DOCKER_DATA}/dns-ha-proxy/pihole/etc/pihole:/etc/pihole"
      - "${DOCKER_DATA}/dns-ha-proxy/pihole/etc/dnsmasq.d:/etc/dnsmasq.d/"
      - "${DOCKER_DATA}/dns-ha-proxy/pihole/etc/resolv.conf:/etc/resolv.conf"
    profiles: ["dns"]
    labels:
      <<: *backrest-labels
    


  unbound:
    # Dynamically selects the image based on the .env file. Defaults to x86.
    # For ARM/Raspberry Pi set the UNBOUND_IMAGE to mvance/unbound-rpi:1.22.0
    image: ${UNBOUND_IMAGE:-mvance/unbound:1.22.0}
    container_name: unbound
    hostname: unbound
    <<: [*restart, *logging]
    networks:
      dns-internal-net:
        ipv4_address: ${UNBOUND_IP:-172.22.0.7}
    ports:
      - "5335:5335/tcp"
      - "5335:5335/udp"
    volumes:
      - "${DOCKER_DATA}/dns-ha-proxy/unbound/unbound.conf:/opt/unbound/etc/unbound/unbound.conf:rw"
      - "${DOCKER_DATA}/dns-ha-proxy/unbound/unbound.log:/opt/unbound/etc/unbound/unbound.log:rw"
    healthcheck:
      disable: true
    profiles: ["dns"]
    labels:
      <<: *backrest-labels

  # ---------------- NPM (INTERNAL) ----------------
  npm-internal:
    <<: *npm-base
    container_name: npm-internal
    hostname: npm-internal
    networks:
      dns-internal-net:
        ipv4_address: ${NPM_INT_IP:-172.22.0.8}
      proxy-network:
    volumes:
      - "${DOCKER_DATA}/dns-ha-proxy/npm/config:/config:rw"
    profiles: ["npm-int"]

  # ---------------- NPM (EXTERNAL) ----------------
  npm-external:
    <<: *npm-base
    container_name: npm-external
    hostname: npm-external
    networks:
      - proxy-network
    volumes:
      - "${DOCKER_DATA}/dns-ha-proxy/nginxproxymanager/config:/config"
    profiles: ["npm-ext"]

  # ---------------- HIGH AVAILABILITY ----------------
  keepalived:
    image: osixia/keepalived:2.3.4
    container_name: keepalived
    hostname: keepalived
    <<: *restart
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - NET_BROADCAST
    environment:
      <<: *common-env
    volumes:
      - "${DOCKER_DATA}/dns-ha-proxy/keepalived/keepalived.conf:/etc/keepalived/keepalived.conf:ro"
      - /etc/localtime:/etc/localtime:ro
    profiles: ["ha"]
    labels:
      backrest.priority: "low"
      backrest.action: "none"
  
  # ---------------- SYNC SERVICE (RUN ON ONE HOST ONLY) ----------------
  nebula-sync:
    image: ghcr.io/lovelaze/nebula-sync:v0.11.1
    container_name: nebula-sync
    <<: *restart
    networks:
      - dns-internal-net
      - proxy-network
    env_file:
      - ${DOCKER_DATA}/dns-ha-proxy/nebula-sync/.env #Contains all the primary and secondary and all rules for the sync
    profiles: ["sync"]
    labels:
      backrest.backup: "true"
      backrest.priority: "medium"
      backrest.action: "none"

  # ---------------- ANALYTICS (RUN ON SECONDARY HOST ONLY) ----------------
  goaccess:
    image: justsky/goaccess-for-nginxproxymanager
    container_name: goaccess-npm
    hostname: goaccess-npm
    <<: *restart
    ports:
      - 7880:7880
    networks:
      - proxy-network
    environment:
      <<: *common-env
    volumes:
      # Added :ro (read-only) for security since it only needs to read logs
      - ${DOCKER_DATA}/dns-ha-proxy/nginxproxymanager/config/log:/opt/log:ro
    depends_on:
      # Changed this to point to the correct service name in this compose file
      - npm-external
    profiles: ["analytics"]
    labels:
      backrest.backup: "false"
      backrest.priority: "low"
      backrest.action: "none"
# --------------------------------------------------------------------------------
# NETWORKS
# --------------------------------------------------------------------------------
networks:
  dns-internal-net:
    name: dns-ha-proxy-net
    driver: bridge
    ipam:
      config:
        - subnet: ${SUBNET:-172.22.0.0/16}
  proxy-network:
    name: ${EXTERNAL_NETWORK_NAME:-proxy-network}
    external: true