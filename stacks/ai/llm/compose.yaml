services:
  # --------------------------------------------------------
  # REDIS / VALKEY
  # --------------------------------------------------------
  redis:
    image: docker.io/valkey/valkey:8.1.3-alpine3.22
    container_name: llm-redis
    hostname: redis
    restart: unless-stopped
    networks:
      - proxy-network
    volumes:
      - valkey-data:/data
    command: valkey-server --save 30 1 --loglevel warning
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "1"

  # --------------------------------------------------------
  # SEARXNG
  # --------------------------------------------------------
  searxng:
    image: ghcr.io/searxng/searxng:2026.2.13-97e572728
    container_name: llm-searxng
    hostname: searxng
    restart: unless-stopped
    ports:
      - 7777:8080
    networks:
      - proxy-network
    environment:
      SEARXNG_BASE_URL: http://localhost:8080/ 
      TZ: ${TZ}
    volumes:
      - ${DOCKER_DATA}/llm/searxng:/etc/searxng:rw
      - searxng-data:/var/cache/searxng:rw  
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "1"

  # --------------------------------------------------------
  # APACHE TIKA
  # --------------------------------------------------------
  tika:
    image: apache/tika:3.3.0.0-full
    container_name: llm-tika
    hostname: tika
    restart: unless-stopped
    ports:
      - 9998:9998
    networks:
      - proxy-network
  
  # --------------------------------------------------------
  # OPEN WEBUI (CLIENT ONLY, TALKS TO MODEL-RUNNER)
  # --------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.12
    container_name: llm-open-webui
    hostname: openwebui
    restart: unless-stopped
    env_file:
      - ${DOCKER_DATA}/llm/openwebui/.env    
    ports:
      - 3000:8080
    networks:
      - proxy-network
    environment:
      TZ: ${TZ} 
      NVIDIA_VISIBLE_DEVICES: all
      ENABLE_OLLAMA_API: true
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_API_BASE_URL: http://ollama:11434 
      WEBSEARCH_ENABLED: true
      WEBSEARCH_ENGINE: searxng
      SEARXNG_QUERY_URL: http://searxng:8080/search?q=<query>&format=json
      WEB_LOADER_ENGINE: none
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    depends_on:
      - redis
      - searxng
    volumes:
      - ${DOCKER_DATA}/llm/openwebui:/app/backend/data
      - ${DOCKER_DATA}/llm/openwebui/logs:/opt/open-webui/logs  
    extra_hosts:
        - 'host.docker.internal:host-gateway'
  ollama:
    image: ollama/ollama:0.19.0
    container_name: llm-ollama
    hostname: ollama
    restart: unless-stopped
    ports:
      - 11434:11434
    networks:
      - proxy-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1 
              capabilities: [gpu]
    environment:
      TZ: ${TZ} 
      NVIDIA_VISIBLE_DEVICES: all
      OLLAMA_MAX_LOADED_MODELS: 1
      OLLAMA_KEEP_ALIVE: -1
      OLLAMA_MAX_QUEUE: 1
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_DEBUG: true
      OLLAMA_NOPRUNE: true
    runtime: nvidia
    volumes:
      - ${DOCKER_DATA}/llm/ollama/data:/root/.ollama
    depends_on:
     - redis

networks:
  proxy-network:
    name: ${EXTERNAL_NETWORK_NAME:-proxy-network}
    external: true

volumes:
  searxng-data:
  valkey-data:
    null