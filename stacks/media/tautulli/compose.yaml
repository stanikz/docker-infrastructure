services:
  tautulli:
    image: tautulli/tautulli:v2.17.0
    container_name: tautulli
    hostname: tautulli
    restart: unless-stopped
    ports:
      - 7171:8181
    networks:
      - proxy-network
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - ${DOCKER_DATA}/tautulli/config:/config
    labels:
      backrest.backup: "true"
      backrest.priority: "medium"
      backrest.action: "none"
      
networks:  
  proxy-network:
    name: ${EXTERNAL_NETWORK_NAME:-proxy-network}
    external: true