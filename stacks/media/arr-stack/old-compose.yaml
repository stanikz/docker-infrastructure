services:
  agregarr:
    image: agregarr/agregarr:v2.4.0
    container_name: agregarr
    hostname: agregarr
    restart: unless-stopped
    ports:
      - 7474:7171    
    networks:
      - internal-net
      - proxy-network
    env_file:
      - .env
    environment:
      TZ: ${TZ}
    user: "${PUID}:${PGID}"
    volumes:
      - ${DOCKER_DATA}/arr-stack/agregarr/config:/app/config
      - /mnt/media/arrs/agregarr/movie-placeholder:/data/movies
      - /mnt/media/arrs/agregarr/tv-placeholder:/data/tv
      - /mnt/media/arrs/agregarr/kids-placeholder:/data/kids
  
  bazarr:
    image: lscr.io/linuxserver/bazarr:v1.5.5-ls337 #v1.5.4-ls331 https://github.com/linuxserver/docker-bazarr/releases
    container_name: bazarr
    hostname: bazarr
    restart: unless-stopped
    ports:
      - 7373:6767
    networks:
      - internal-net
      - proxy-network
    env_file:
      - .env
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - ${DOCKER_DATA}/arr-stack/bazarr/config:/config
      - /mnt:/mnt:rslave
    depends_on:
      radarr:
        condition: service_healthy
      sonarr:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6767"]
      interval: 10s
      timeout: 3s
      retries: 5
  
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.4.6
    container_name: flaresolverr
    hostname: flaresolverr
    restart: unless-stopped
    ports:
      - 8192:8191
    networks:
      - internal-net
      - proxy-network
    env_file:
      - .env
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_HTML: ${LOG_HTML:-false}
      CAPTCHA_SOLVER: ${CAPTCHA_SOLVER:-none}
      TZ: ${TZ}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191"]
      interval: 10s
      timeout: 3s
      retries: 5
  
