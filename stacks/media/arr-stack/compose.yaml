# --------------------------------------------------------------------------------
# EXTENSION FIELDS & ANCHORS (Templates)
# --------------------------------------------------------------------------------

# 1. Common Environment Variables
x-env-common: &env-common
  PUID: ${PUID}
  PGID: ${PGID}
  TZ: ${TZ}
  

# 2. Base Service Template (Restart, Networks, Logging)
x-service-base: &service-base
  restart: unless-stopped
  networks:
    - internal-net
    - proxy-network
  env_file:
    - .env


# 3. Healthcheck Template
x-healthcheck-curl: &healthcheck-curl
  interval: 10s
  timeout: 3s
  retries: 5

# 4. Logging Template
x-logging-json: &logging-json
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

# 5. Arr-Stack Services Base
x-arr-service: &arr-service
  <<: *service-base
  environment:
    <<: *env-common
    UMASK: ${UMASK}
  logging: *logging-json

# 6. Services that depend on Radarr & Sonarr
x-depends-on-arr: &depends-on-arr
  radarr:
    condition: service_healthy
  sonarr:
    condition: service_healthy

# 7. Services that depend on Prowlarr, Flaresolverr, Decypharr, Zurg, Rclone
x-depends-on-core: &depends-on-core
  prowlarr:
    condition: service_healthy
  flaresolverr:
    condition: service_healthy
  decypharr:
    condition: service_healthy
  zurg:
    condition: service_healthy
  rclone:
    condition: service_healthy

# 8. Backrest Labels
x-labels-backrest: &labels-backrest
  backrest.priority: "high"
  backrest.action: "stop"
  backrest.wait-time: "30"
# --------------------------------------------------------------------------------
# SERVICES
# --------------------------------------------------------------------------------
services:
  agregarr:
    <<: *arr-service
    image: agregarr/agregarr:v2.4.2
    container_name: agregarr
    hostname: agregarr
    ports:
      - 7474:7171
    user: "${PUID}:${PGID}"
    volumes:
      - ${DOCKER_DATA}/arr-stack/agregarr/config:/app/config
      - /mnt/media/arrs/agregarr/movie-placeholder:/data/movies
      - /mnt/media/arrs/agregarr/tv-placeholder:/data/tv
      - /mnt/media/arrs/agregarr/kids-placeholder:/data/kids
    labels:
      <<: *labels-backrest

  bazarr:
    <<: *arr-service
    image: lscr.io/linuxserver/bazarr:v1.5.5-ls337
    container_name: bazarr
    hostname: bazarr
    ports:
      - 7373:6767
    volumes:
      - ${DOCKER_DATA}/arr-stack/bazarr/config:/config
      - /mnt:/mnt:rslave
    depends_on: *depends-on-arr
    healthcheck:
      <<: *healthcheck-curl
      test: ["CMD", "curl", "-f", "http://localhost:6767"]
    labels:
      <<: *labels-backrest

  flaresolverr:
    <<: *service-base
    image: ghcr.io/flaresolverr/flaresolverr:v3.4.6
    container_name: flaresolverr
    hostname: flaresolverr
    ports:
      - 8192:8191
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_HTML: ${LOG_HTML:-false}
      CAPTCHA_SOLVER: ${CAPTCHA_SOLVER:-none}
      TZ: ${TZ}
    logging: *logging-json
    healthcheck:
      <<: *healthcheck-curl
      test: ["CMD", "curl", "-f", "http://localhost:8191"]
    labels:
      backrest.backup: "true"
      backrest.priority: "low"
      backrest.action: "none"


  seerr:
    <<: *service-base
    image: ghcr.io/seerr-team/seerr:v3.1.0
    init: true
    container_name: seerr
    hostname: seerr
    ports:
      - 7777:5055
    environment:
      LOG_LEVEL: debug
      <<: *env-common
    volumes:
      - ${DOCKER_DATA}/arr-stack/seerr/config:/app/config
    depends_on: *depends-on-arr
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    labels:
      <<: *labels-backrest

  prowlarr:
    <<: *service-base
    image: ghcr.io/hotio/prowlarr:release-2c583e5
    container_name: prowlarr
    hostname: prowlarr
    ports:
      - 7676:9696
    environment:
      <<: *env-common
    volumes:
      - ${DOCKER_DATA}/arr-stack/prowlarr/config:/config
      - ${DOCKER_DATA}/arr-stack/prowlarr/Custom:/config/Definitions/Custom
    logging: *logging-json
    depends_on:
      - flaresolverr
    healthcheck:
      <<: *healthcheck-curl
      test: ["CMD", "curl", "-f", "http://localhost:9696"]
    labels:
      <<: *labels-backrest

  decypharr:
    <<: *service-base
    image: cy01/blackhole:v1.1.6
    container_name: decypharr
    hostname: decypharr
    ports:
      - 7575:8282
    environment:
      <<: *env-common
    volumes:
      - ${DOCKER_DATA}/arr-stack/decypharr/config:/app
      - /mnt/:/mnt:rshared
    devices:
      - /dev/fuse:/dev/fuse:rwm
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    depends_on:
      zurg:
        condition: service_healthy
      rclone:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/bin/healthcheck", "--config", "/app/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      <<: *labels-backrest

  radarr:
    <<: *arr-service
    image: lscr.io/linuxserver/radarr:6.0.4.10291-ls293
    container_name: radarr
    hostname: radarr
    ports:
      - 7878:7878
    volumes:
      - ${DOCKER_DATA}/arr-stack/radarr/config:/config
      - /mnt:/mnt:rslave
    depends_on: *depends-on-core
    healthcheck:
      <<: *healthcheck-curl
      test: ["CMD", "curl", "-f", "http://localhost:7878"]
    labels:
      <<: *labels-backrest
    

  sonarr:
    <<: *arr-service
    image: lscr.io/linuxserver/sonarr:4.0.16.2944-ls303
    container_name: sonarr
    hostname: sonarr
    ports:
      - 7272:8989
    volumes:
      - ${DOCKER_DATA}/arr-stack/sonarr/config:/config
      - /mnt:/mnt:rslave
    depends_on: *depends-on-core
    healthcheck:
      <<: *healthcheck-curl
      test: ["CMD", "curl", "-f", "http://localhost:8989"]
    labels:
      <<: *labels-backrest

  zilean:
    <<: *service-base
    image: ipromknight/zilean:v3.5.0
    container_name: zilean
    hostname: zilean
    ports:
      - 8181:8181
    environment:
      Zilean__Database__ConnectionString: ${ZILEAN_CONNECTION_STRING}
    tty: true
    volumes:
      - ${DOCKER_DATA}/arr-stack/zilean:/app/data
      - ${DOCKER_DATA}/arr-stack/zilean/tmp:/tmp
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: curl --connect-timeout 10 --silent --show-error --fail http://localhost:8181/healthchecks/ping
      timeout: 60s
      interval: 30s
      retries: 10
    labels:
      <<: *labels-backrest
      backrest.priority: "critical"
      backrest.wait-time: "30"

  zurg:
    <<: *service-base
    image: ghcr.io/debridmediamanager/zurg-testing:v0.9.3-final
    container_name: zurg
    hostname: zurg
    ports:
      - 9997:9999
    environment:
      <<: *env-common
      user: ${PUID}:${PGID}
      RD_KEY: ${RD_KEY}
      PLEX_TOKEN: ${PLEX_TOKEN}
    volumes:
      - ${DOCKER_DATA}/arr-stack/zurg/zurg-plex_update.sh:/app/plex_update.sh
      - ${DOCKER_DATA}/arr-stack/zurg/zurg-config.yml:/app/config.yml
      - ${DOCKER_DATA}/arr-stack/zurg/zurg_data:/app/data
    healthcheck:
      <<: *healthcheck-curl
      test: curl -f localhost:9999/dav/version.txt || exit 1
    labels:
      <<: *labels-backrest
      backrest.priority: "critical"
      backrest.wait-time: "30"

  rclone:
    <<: *service-base
    image: rclone/rclone:1.73.4
    container_name: rclone
    hostname: rclone
    networks:
      - internal-net
    environment:
      <<: *env-common
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    devices:
      - /dev/fuse:/dev/fuse:rwm
    stop_grace_period: 5s  # Give it time to unmount cleanly
    stop_signal: SIGTERM
    volumes:
      - ${DOCKER_DATA}/arr-stack/zurg/entrypoint.sh:/entrypoint.sh
      - ${DOCKER_DATA}/arr-stack/zurg/rclone.conf:/config/rclone/rclone.conf
      - /mnt/media/arrs/.zurg-cache:/root/.cache/rclone
      - /mnt/media/arrs/zurg-mount:/data:rshared
    depends_on:
      zurg:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "test", "-d", "/data/__all__"]
      interval: 5s
      timeout: 5s
      retries: 3
    labels:
      <<: *labels-backrest

  postgres:
    <<: *service-base
    image: postgres:17.0-alpine3.20
    container_name: zilean-db-postgres-17
    hostname: zilean-postgres-17
    ports:
      - 5433:5432
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_DB: zilean
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${DOCKER_DATA}/arr-stack/postgres:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    labels:
      <<: *labels-backrest
      backrest.priority: "critical"
      backrest.wait-time: "30"

networks:
  proxy-network:
    name: ${EXTERNAL_NETWORK_NAME:-proxy-network}
    external: true
  internal-net:
    name: arr-stack-net
    driver: bridge
