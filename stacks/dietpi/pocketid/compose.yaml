services:
  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2.5.0 
    container_name: pocketid
    hostname: pocketid-local
    restart: unless-stopped
    ports:
      - 1411:1411
    networks:
      - proxy-network
    env_file: 
      - .env
    volumes:
      - ${DOCKER_DATA}/pocketid/data:/app/data
    # Optional healthcheck.
    healthcheck:
      test: ["CMD", "/app/pocket-id", "healthcheck"]
      interval: 1m30s
      timeout: 5s
      retries: 2
      start_period: 10s

networks:
  proxy-network:
    name: ${EXTERNAL_NETWORK_NAME:-proxy-network}
    external: true
