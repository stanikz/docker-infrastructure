name: pangolin
services:             #[Versions: 1.15.4 and 1.13.1 worked best on the VPS]
  pangolin:
    image: fosrl/pangolin:1.16.2
    container_name: pangolin
    hostname: pangolin-vps
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      NODE_OPTIONS: --max-old-space-size=600
    env_file:
      - ${DOCKER_DATA}/pangolin/config/.env
    volumes:
      - ${DOCKER_DATA}/pangolin/config:/app/config
      - ${DOCKER_DATA}/pangolin/config/pangolin-data/certificates:/var/certificates
      - ${DOCKER_DATA}/pangolin/config/pangolin-data/dynamic:/var/dynamic
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/"]
      interval: "20s" 
      timeout: "5s"   
      retries: 3

#    mem_limit: 700m
#    memswap_limit: 1g

  gerbil:
    image: fosrl/gerbil:1.3.0
    container_name: gerbil
    hostname: gerbil-vps
    restart: unless-stopped
    ports:
      - 51820:51820/udp
      - 21820:21820/udp
      - 443:443
      - 80:80
    environment:
      TZ: ${TZ}
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - /wait-for-pangolin.sh
      - gerbil
      - --reachableAt=http://gerbil:3004
      - --generateAndSaveKeyTo=/var/config/key
      - --remoteConfig=http://pangolin:3001/api/v1/
    volumes:
      - ${DOCKER_DATA}/pangolin/config/:/var/config
      - ${DOCKER_DATA}/pangolin/wait-for-pangolin.sh:/wait-for-pangolin.sh:ro
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    
#    mem_limit: 80m
#    memswap_limit: 160m

  traefik:
    image: traefik:v3.6.11
    container_name: traefik
    restart: unless-stopped
    environment:
      TZ: ${TZ}
    network_mode: service:gerbil
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - --configFile=/etc/traefik/traefik_config.yml
    volumes:
      - ${DOCKER_DATA}/pangolin/config/traefik:/etc/traefik:ro
      - ${DOCKER_DATA}/pangolin/config/letsencrypt:/letsencrypt
      - ${DOCKER_DATA}/pangolin/config/traefik/logs:/var/log/traefik
      - ${DOCKER_DATA}/pangolin/config/pangolin-data/certificates:/var/certificates:ro
      - ${DOCKER_DATA}/pangolin/config/pangolin-data/dynamic:/var/dynamic:ro
    
#     mem_limit: 100m
#     memswap_limit: 200m

networks:
  default:
    driver: bridge
    name: pangolin