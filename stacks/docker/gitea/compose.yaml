services:       
  server:
    image: gitea/gitea:1.25.5
    container_name: gitea
    hostname: gitea
    restart: always
    ports:
      - 3000:3000
      - 2223:22
    networks:
      - internal-net
      - proxy-network
    environment:
      USER_UID: ${PUID}
      USER_GID: ${PGID}
      GITEA__database__DB_TYPE: ${DB_TYPE}
      GITEA__database__HOST: ${GITEA_DB_HOST}
      GITEA__database__NAME: ${GITEA_DB_NAME}
      GITEA__database__USER: ${GITEA_DB_USER}
      GITEA__database__PASSWD: ${GITEA_DB_PASS}
    volumes:
      - ${DOCKER_DATA}/gitea/data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - db
    #security_opt:
    #  - no-new-privileges:true
  
  db:
    image: postgres:17
    container_name: gitea-db
    hostname: gitea-postgres17
    restart: always
    networks:
      - internal-net
      - db-network
    environment:
      POSTGRES_DB: ${GITEA_DB_NAME}
      POSTGRES_USER: ${GITEA_DB_USER}
      POSTGRES_PASSWORD: ${GITEA_DB_PASS}
      TZ: ${TZ}
    volumes:
      - ${DOCKER_DATA}/gitea/postgres:/var/lib/postgresql/data

networks:
  proxy-network:
    name: ${EXTERNAL_NETWORK_NAME:-proxy-network}
    external: true
  internal-net:
    driver: bridge
  db-network:
    name: db-net
    external: true