services:
  server:
    image: codeberg.org/forgejo/forgejo:14.0.2
    container_name: forgejo
    hostname: forgejo
    restart: unless-stopped
    ports:
      - "3222:3000"
      - "222:22"
    networks:
      - internal-net
      - proxy-network
    env_file:
      - .env
    environment:
      - TZ=${TZ}
    volumes:
      - ${DOCKER_DATA}/forgejo/app:/data
      - /etc/localtime:/etc/localtime:ro 
    depends_on:
      - db

  db:
    image: postgres:17
    container_name: forgejo_db
    hostname: forgejo-postgres17
    restart: unless-stopped
    networks:
      - internal-net
      - db-network
    environment:
      - POSTGRES_USER=${FORGEJO__database__USER}
      - POSTGRES_PASSWORD=${FORGEJO__database__PASSWD}
      - POSTGRES_DB=${FORGEJO__database__NAME}
    volumes:
      - ${DOCKER_DATA}/forgejo/db:/var/lib/postgresql/data
    
networks:
  proxy-network:
    name: ${EXTERNAL_NETWORK_NAME:-proxy-network}
    external: true
  internal-net:
    driver: bridge
  db-network:
    name: db-net
    external: true