x-backrest-labels: &backrest-labels
    backrest.backup: "true"
    backrest.priority: "high"
    backrest.action: "stop"
services:
  bookstack:
    image: linuxserver/bookstack:26.03.20260315
    container_name: bookstack
    hostname: bookstack-app
    restart: unless-stopped
    ports:
      - 6875:80
    networks:
      - internal-net #network_mode: myNetwork
      - proxy-network
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      PHP_DATE_TIMEZONE: ${TZ}
      APP_URL: ${APP_URL}
      APP_KEY: ${APP_KEY}
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_DATABASE: ${DB_DATABASE}
      DB_PORT: 3306
      AUTH_METHOD: oidc
      AUTH_AUTO_INITIATE: true
      OIDC_DUMP_USER_DETAILS: false
      OIDC_NAME: "SSO"
      OIDC_DISPLAY_NAME_CLAIMS: name
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OIDC_ISSUER: ${OIDC_ISSUER}
      OIDC_END_SESSION_ENDPOINT: true
      OIDC_ISSUER_DISCOVER: true
      OIDC_USER_TO_GROUPS: true
      OIDC_GROUPS_CLAIM: groups
      OIDC_ADDITIONAL_SCOPES: groups
      OIDC_REMOVE_FROM_GROUPS: true
    volumes:
      - ${DOCKER_DATA}/bookstack/data:/config
    depends_on:
      bookstack_db:
        condition: service_healthy
    labels:
      <<: *backrest-labels
      backrest.wait-time: "30"
        
  bookstack_db:
    image: ghcr.io/linuxserver/mariadb:11.4.9
    container_name: bookstack_db
    hostname: bookstack-mariadb
    restart: unless-stopped
    networks:
      - internal-net
      - db-network
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - ${DOCKER_DATA}/bookstack/db:/config
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      <<: *backrest-labels
      backrest.priority: "critical"
      backrest.wait-time: "60"

networks:
  proxy-network:
    name: ${EXTERNAL_NETWORK_NAME:-proxy-network}
    external: true
  internal-net:
    name: bookstack-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
  db-network:
    name: db-net
    external: true