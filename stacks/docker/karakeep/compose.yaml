services:
  web:
    image: ghcr.io/karakeep-app/karakeep:0.31.0
    container_name: karakeep-web
    restart: unless-stopped
    hostname: karakeep-web
    ports:
      - 4321:3000
    networks:
      - proxy-network    
    environment:
      MEILI_ADDR: http://meilisearch:7700
      BROWSER_WEB_URL: http://chrome:9222
      OPENAI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      INFERENCE_TEXT_MODEL: ${AI_MODEL} 
      INFERENCE_IMAGE_MODEL: ${AI_MODEL}
      EMBEDDING_TEXT_MODEL: ${AI_MODEL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      OAUTH_WELLKNOWN_URL: ${OAUTH_WELLKNOWN_URL}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID}
      OAUTH_PROVIDER_NAME: ${OAUTH_PROVIDER_NAME}
      OAUTH_ALLOW_DANGEROUS_EMAIL_ACCOUNT_LINKING: true
      DISABLE_PASSWORD_AUTH: false
      DISABLE_SIGNUPS: true
      DATA_DIR: /data # DON'T CHANGE THIS
    volumes:
      - ${DOCKER_DATA}/karakeep/data:/data
      
  chrome:
    image: gcr.io/zenika-hub/alpine-chrome:124
    container_name: karakeep-chrome
    hostname: karakeep-chrome
    restart: unless-stopped
    networks:
      - proxy-network
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars
      
  meilisearch:
    image: getmeili/meilisearch:v1.41.0
    container_name: karakeep-milisearch
    hostname: karakeep-milisearch
    restart: unless-stopped
    networks:
      - proxy-network
    environment:
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - ${DOCKER_DATA}/karakeep/meilisearch:/meili_data
    ports:
      - 7700:7700  #--> THIS PART IS ONLY NEEDED WHEN UPGRADING AND IMPORTING THE DB DUMP <---
    command: >     #--> FOLLOW the Instruction in Bookstack on migration process#
      meilisearch --import-dump /meili_data/dumps/20260331-145238337.dump
    
networks:
  proxy-network:
    name: ${EXTERNAL_NETWORK_NAME:-proxy-network}
    external: true