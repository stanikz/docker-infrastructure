services:
  vaultwarden:
    image: vaultwarden/server:1.35.4
    container_name: vaultwarden
    hostname: vaultwarden
    restart: unless-stopped
    ports:
      - 6550:80
      - 3012:3012
    networks:
      - proxy-network
    environment:
      WEBSOCKET_ENABLED: true
      SIGNUPS_ALLOWED: false
    volumes:
      - ${DOCKER_DATA}/vaultwarden/vw-data:/data
          
networks:
  proxy-network:
    name: ${EXTERNAL_NETWORK_NAME:-proxy-network}
    external: true