x-backrest-labels: &backrest-labels
    backrest.backup: "true"
    backrest.priority: "critical"
    backrest.action: "stop"
services:
  vaultwarden:
    image: vaultwarden/server:1.35.4
    container_name: vaultwarden
    hostname: vaultwarden
    restart: unless-stopped
    ports:
      - 6550:80
      - 3012:3012
    networks:
      - proxy-network
    environment:
      WEBSOCKET_ENABLED: true
      SIGNUPS_ALLOWED: false
    volumes:
      - ${DOCKER_DATA}/vaultwarden/vw-data:/data
    labels:
      <<: *backrest-labels
      backrest.wait-time: "30"
          
networks:
  proxy-network:
    name: ${EXTERNAL_NETWORK_NAME:-proxy-network}
    external: true