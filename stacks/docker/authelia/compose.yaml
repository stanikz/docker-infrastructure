
services:
  authelia:
    image: authelia/authelia:4.39.19
    container_name: authelia
    hostname: authelia
    restart: unless-stopped
    ports:
      - 9091:9091
    networks:
      - proxy-network
    environment:
      TZ: ${TZ}
      # These variables AUTOMATICALLY override the missing keys in configuration.yml
      #AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET: ${AUTHELIA_JWT_KEYS}
      #AUTHELIA_SESSION_SECRET: ${AUTHELIA_JWT_KEYS}
      #AUTHELIA_STORAGE_ENCRYPTION_KEY: ${AUTHELIA_STORAGE_ENCRYPTION_KEY}
      #AUTHELIA_NOTIFIER_SMTP_PASSWORD: ${AUTHELIA_GMAIL_APP_PASS}
      #AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET: ${AUTHELIA_HMAC_SECRET} # You need this for OIDC
      IDENTITY_VALIDATION_JWT_SECRET: ${IDENTITY_VALIDATION_JWT_SECRET}
      AUTHELIA_SESSION_SECRET: ${AUTHELIA_SESSION_SECRET}
      AUTHELIA_NOTIFIER_SMTP_PASSWORD: ${AUTHELIA_NOTIFIER_SMTP_PASSWORD}
      HMAC_SECRET: ${HMAC_SECRET}
    volumes:
      - ${DOCKER_DATA}/authelia/config:/config #change this to a shared folder on your system. DO NOT use a "volume"
    labels:
      backrest.backup: "true"
      backrest.priority: "high"
      backrest.action: "stop"
      backrest.wait-time: "20"
    
networks:
  proxy-network:
    name: ${EXTERNAL_NETWORK_NAME:-proxy-network}
    external: true