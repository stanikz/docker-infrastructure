x-labels-backrest: &labels-backrest
  backrest.backup: "true"
  backrest.priority: "high"
  backrest.action: "stop"
  backrest.wait-time: "30"
services:  
  comet:
    image: ghcr.io/g0ldyy/comet@sha256:d4549e07e48934ec63008afdabb69f45ae5926e2f696e52822a1832460c2c72a
    container_name: comet
    hostname: comet-app
    restart: unless-stopped
    ports:
      - 8000:8000
    networks:
      - proxy-network
      - internal-net
    env_file:
      - ${DOCKER_DATA}/comet/.env
    depends_on:
      comet_db:
        condition: service_healthy
    volumes:
      - ${DOCKER_DATA}/comet/app/data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.85"
        reservations:
          cpus: "0.5"
    labels:
      <<: *labels-backrest
    

  comet_db:
    image: postgres:17-alpine3.22
    container_name: comet-db-postgres-17
    hostname: comet-db
    restart: unless-stopped
    ports:
      - 5434:5432
    networks:
    - internal-net
    - db-network
    volumes:
      - ${DOCKER_DATA}/comet/app/db:/var/lib/postgresql/data
      - ${DOCKER_DATA}/comet/custom-db-config.sh:/entrypoint.sh:ro
    shm_size: 2G
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U comet-user -d comet-db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.4"
        reservations:
          cpus: "0.2"
    labels:
      <<: *labels-backrest
      backrest.priority: "critical"

networks:
  proxy-network:
    name: ${EXTERNAL_NETWORK_NAME:-proxy-network}
    external: true
  internal-net:
    name: comet-net
    driver: bridge
  db-network:
    name: db-net
    external: true