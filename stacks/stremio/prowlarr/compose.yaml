services:  
  prowlarr:
    image: ghcr.io/hotio/prowlarr:release-2.3.0.5236
    container_name: prowlarr
    hostname: prowlarr
    restart: unless-stopped
    ports:
      - 9696:9696
    networks:
      - proxy-network
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      WEBUI_PORT: 9696
    volumes:
      - .${DOCKER_DATA}/prowlarr/config:/config
      - .${DOCKER_DATA}/prowlarr/Custom:/config/Definitions/Custom
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
      
networks:
  proxy-network:
    name: ${EXTERNAL_NETWORK_NAME:-proxy-network}
    external: true
