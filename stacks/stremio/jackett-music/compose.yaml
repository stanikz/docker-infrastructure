services:
  jackett:
    image: lscr.io/linuxserver/jackett:v0.24.532-ls259
    container_name: jackett-music
    hostname: jackett-music
    restart: unless-stopped
    ports:
      - 9117:9117
    networks:
      - proxy-network
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
    volumes:
      - ${DOCKER_DATA}/jackett/appdata:/config
      - ${DOCKER_DATA}/jackett/downloads:/downloads
    depends_on:
      - flaresolverr
    
  
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.4.6
    container_name: flaresolverr
    hostname: flaresolverr
    restart: unless-stopped
    ports:
      - ${PORT:-8191}:8191
    networks:
      - proxy-network
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_HTML: ${LOG_HTML:-false}
      CAPTCHA_SOLVER: ${CAPTCHA_SOLVER:-none}
      TZ: ${TZ}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
networks:  
  proxy-network:
    name: ${EXTERNAL_NETWORK_NAME:-proxy-network}
    external: true