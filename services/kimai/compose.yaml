services:
  sqldb:
    image: mysql:8.3
    container_name: kimai-db
    hostname: kimai_db
    restart: unless-stopped
    networks:
      - internal-net
      - db-network
    environment:
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
    command: --default-storage-engine innodb
    volumes:
      - ${DOCKER_DATA}/services/kimai/mysql_data:/var/lib/mysql
    healthcheck:
      test: mysqladmin -p$$MYSQL_ROOT_PASSWORD ping -h localhost
      interval: 20s
      start_period: 10s
      timeout: 10s
      retries: 3

  kimai:
    image: kimai/kimai2:apache-2.51.0
    container_name: kimai-app
    hostname: kimai
    restart: unless-stopped
    ports:
      - 8001:8001
    networks:
      - internal-net
      - proxy-network
    environment:
      ADMINMAIL: ${ADMIN_EMAIL}
      ADMINPASS: ${ADMIN_PASSWORD}
      DATABASE_URL: "mysql://${DATABASE_USER}:${DATABASE_PASSWORD}@sqldb/${DATABASE_NAME}?charset=utf8mb4&serverVersion=8.3.0"
    volumes:
      - ${DOCKER_DATA}/services/kimai/data:/opt/kimai/var/data
      - ${DOCKER_DATA}/services/kimai/plugins:/opt/kimai/var/plugins
    

networks:
  proxy-network:
    name: ${EXTERNAL_NETWORK_NAME:-proxy-network}
    external: true
  internal-net:
    driver: bridge
  db-network:
    name: db-net
    external: true