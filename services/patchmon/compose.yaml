# =============================================================================
# PatchMon Docker Compose - Production
# =============================================================================
# Before starting, copy env.example to .env and fill in your values:
#
#   cp env.example .env
#
# Then start PatchMon:
#
#   docker compose up -d
#
# See the PatchMon documentation for full configuration details.
# =============================================================================

name: patchmon

services:
  database:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - internal-net
      - db-network
    volumes:
      - ${DOCKER_DATA}/services/patchmon/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 5s
      retries: 7
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Simple Redis configuration - no memory limits to prevent OOM errors
    # If you need memory limits, set maxmemory-policy to 'allkeys-lru' instead of 'noeviction'
    # to allow eviction rather than rejecting commands
    # Debug logging: Use --loglevel debug for maximum verbosity, or --loglevel verbose for less output
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - internal-net
    volumes:
      - ${DOCKER_DATA}/services/patchmon/redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"] # CHANGE THIS TO YOUR REDIS PASSWORD
      interval: 3s
      timeout: 5s
      retries: 7
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    image: ghcr.io/patchmon/patchmon-backend:latest
    restart: unless-stopped
    env_file: .env
    networks:
      - internal-net
    environment:
      # Internal Docker wiring - do not change
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 0
      ASSETS_DIR: /app/assets
    volumes:
      - ${DOCKER_DATA}/services/patchmon/agent_files:/app/agents
      - ${DOCKER_DATA}/services/patchmon/assets:/app/assets
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ghcr.io/patchmon/patchmon-frontend:latest
    restart: unless-stopped
    ports:
      - 3002:3000
    networks:
      - internal-net
      - proxy-network
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  proxy-network:
    name: ${EXTERNAL_NETWORK_NAME:-proxy-network}
    external: true
  internal-net:
    driver: bridge
  db-network:
    name: db-net
    external: true