services:
  homepage:
    image: ghcr.io/benphelps/homepage:v1.10.1
    container_name: homepage
    restart: unless-stopped
    ports:
      - 3010:3000
    networks:
      - proxy-network
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      HOMEPAGE_ALLOWED_HOSTS: ${HOMEPAGE_ALLOWED_HOSTS} 
    volumes:
      - ${DOCKER_DATA}/homepage/config:/app/config 
      - /var/run/docker.sock:/var/run/docker.sock
    
networks:
  proxy-network:
    name: ${EXTERNAL_NETWORK_NAME:-proxy-network}
    external: true