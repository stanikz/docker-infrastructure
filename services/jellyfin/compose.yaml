services:
  jellyfin:
    image: jellyfin/jellyfin:10.11.0 #linuxserver/jellyfin:10.11.0-rc9
    container_name: jellyfin
    environment:
      TZ: ${TZ}
      PUID: ${PUID}
      PGID: ${PGID}
      HOSTNAME: ${HOSTNAME}
      #JELLYFIN_FFmpeg__probesize: "50M"
      #JELLYFIN_FFmpeg__analyzeduration: "5M"
      JELLYFIN_PublishedServerUrl: http://192.168.10.90
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,video,utility
#    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - riven-network
    ports:
      - 8096:8096
#      - 8920:8920 #Optional - Https webUI (you need to set up your own certificate).
      - 7359:7359/udp #Optional - Allows clients to discover Jellyfin on the local network.
      - 1900:1900/udp #Optional - Service discovery used by DNLA and clients.
    volumes:
      - ./config:/config
      - /mnt/media/jellyfin/metadata:/config/metadata
      - ./cache:/cache
      - ./movies/:/movies
      - ./tv:/tv
      #- /streaming/1080/zurg/__all__:/streaming/1080/zurg/__all__:ro
      #- /streaming/1080/symlinks/shows:/tv:ro
      #- /streaming/1080/symlinks/movies:/movies:ro
      #- /mnt/media:/mnt/media:ro
    restart: unless-stopped

networks:
  riven-network:
    external: true