services:
  navidrome:
    image: deluan/navidrome:v0.60.3
    container_name: navidrome
    hostname: navidrom
    restart: unless-stopped
    ports:
      - "4533:4533"
    networks:
      - proxy-network   #network_mode: myNetwork
    environment:
      # Optional: put your config options customization here. Examples:
      ND_SCANSCHEDULE: "@every 1m"
      ND_LOGLEVEL: debug  
      ND_BASEURL: ""

      ND_DEVACTIVITYPANEL: "true"
      ND_ENABLEUSEREDITING: "true"
      ND_ENABLESTARRATING: "true"

      ND_SPOTIFY_ID: ${SPOTIFY_CLIENT_ID}
      ND_SPOTIFY_SECRET: ${SPOTIFY_CLIENT_SECRET}
    volumes:
      - ${DOCKER_DATA}/services/navidrome/data:/data
      - /mnt/docker-backups/audiobooks:/music:ro

networks:
  proxy-network:
    name: ${EXTERNAL_NETWORK_NAME:-proxy-network}
    external: true