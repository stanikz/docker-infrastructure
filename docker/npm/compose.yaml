services:    
  nginx-proxy-manager:
    image: jlesage/nginx-proxy-manager:v25.09.1
    container_name: npm
    hostname: npm
    restart: unless-stopped
    ports:
      - 81:8181
      - 80:8080
      - 443:4443
    networks:
      - myNetwork
    environment:
      TZ: ${TZ}  
    volumes:
      - ${DOCKER_DATA}/nginxproxymanager/config:/config:rw

  goaccess:
    image: justsky/goaccess-for-nginxproxymanager
    container_name: goaccess-npm
    hostname: goaccess-npm
    restart: unless-stopped
    ports:
      - 7880:7880
    networks:
      - myNetwork
    environment:
      TZ: ${TZ}
    volumes:
      - ${DOCKER_DATA}/nginxproxymanager/config/log:/opt/log
    depends_on:
      - nginx-proxy-manager
      
networks:
  myNetwork:
    external: true