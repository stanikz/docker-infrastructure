services:
  it-tools:
    image: corentinth/it-tools:2024.10.22-7ca5933
    container_name: it-tools-original
    hostname: ittools
    restart: unless-stopped
    ports:
      - 8182:80
    networks:
      - myNetwork

  it-tools-main:
    image: sharevb/it-tools:2026.1.4
    container_name: it-tools-maintained
    hostname: ittools-main
    restart: unless-stopped
    ports:
      - 8183:8080
    networks:
      - myNetwork
    
  networking-toolbox:
    image: lissy93/networking-toolbox:1.6.0
    container_name: networking-toolbox
    hostname: net-toolbox
    restart: unless-stopped
    ports:
      - 3002:3000
    networks:
      - myNetwork
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0  
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 40s

  chartdb:
     image: ghcr.io/chartdb/chartdb:1.19.0
     container_name: chartdb
     hostname: chartdb
     restart: unless-stopped
     ports:
       - 8088:80
     networks:
       - myNetwork
     environment:
       PUID: ${PUID}
       PGID: ${PGID}
       TZ: ${TZ}
     #- OPENAI_API_KEY=<YOUR_OPEN_AI_KEY>
     depends_on:
         - db
  db:
    image: postgres:15
    container_name: chartdb_postgres
    restart: unless-stopped
    networks:
      - myNetwork
    environment:
       # Make sure these values match the DATABASE_URL in the chartdb service
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - chartsdb_data:/var/lib/postgresql/data
      
volumes:
  chartsdb_data:

networks:
  myNetwork:
    external: true