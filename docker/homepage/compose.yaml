services:
  homepage:
    image: ghcr.io/benphelps/homepage:v1.10.1
    container_name: homepage
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      HOMEPAGE_ALLOWED_HOSTS: ${HOMEPAGE_ALLOWED_HOSTS} 
    networks:
      - myNetwork
    ports:
      - 3010:3000
    volumes:
      - /mydocker/homepage/config:/app/config 
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

networks:
  myNetwork:
    external: true